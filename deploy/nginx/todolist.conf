# ============================================================
# Nginx 前端站点配置（阿里云 Ubuntu 专用）
# 部署路径：/etc/nginx/sites-available/todolist
# 适用：Vue / React 单页应用（SPA）
# ============================================================

server {
    # ——— 监听端口 ———
    listen 80;
    listen [::]:80;

    # ——— 域名配置 ———
    # 有域名时改为 your-domain.com；仅用 IP 访问时保持 _
    server_name _;

    # ——— 前端静态文件根目录 ———
    # 与 deploy-front.yml 中的 DEPLOY_PATH 保持一致
    root /var/www/todolist/html;
    index index.html;

    # ——— 日志文件 ———
    access_log /var/log/nginx/todolist_access.log;
    error_log  /var/log/nginx/todolist_error.log;

    # ==========================================
    # 前端 SPA 路由配置
    # 所有未匹配的路由都返回 index.html
    # Vue Router / React Router 的 history 模式必需
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # API 反向代理（前后端同域部署方案）
    # 前端请求 /api/xxx 会被转发到后端服务
    # 如果前后端不同域（跨域），删除此块
    # ==========================================
    location /api/ {
        # 后端服务地址和端口
        proxy_pass http://127.0.0.1:3000;

        # 代理头信息（传递真实客户端信息）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==========================================
    # 静态资源缓存策略
    # 带哈希的文件可长期缓存（Vite/CRA 构建产物）
    # ==========================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==========================================
    # 安全配置
    # ==========================================
    # 禁止访问隐藏文件（.env、.git 等）
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip 压缩（减少传输体积）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
