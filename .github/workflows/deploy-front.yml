# =============================================================================
# 前端自动部署流水线（Vue / React 通用）
# =============================================================================
# 触发：git push 到 main 分支（client 目录或本文件变更）
# 流程：拉取源码 → Node 环境 → 安装依赖 → 打包 dist → SSH 清空旧文件 → 上传新静态资源
# 隐私：服务器 IP、用户名、私钥、部署路径均使用 GitHub Secrets，禁止明文写入本文件
# =============================================================================

name: 部署前端

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/deploy-front.yml'
  workflow_dispatch:

env:
  # 前端子目录（Vue/Vite 默认 client；若项目在根目录改为 .）
  WORK_DIR: client
  # 构建输出目录（Vite 默认 dist；Create React App 改为 build）
  BUILD_DIR: dist

jobs:
  build-and-deploy:
    name: 构建并部署前端
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 第 1 步：拉取仓库最新源码
      # -----------------------------------------------------------------------
      - name: 拉取源码
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 第 2 步：配置 Node.js（版本需与服务器一致，默认 20）
      # -----------------------------------------------------------------------
      - name: 配置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ env.WORK_DIR }}/package-lock.json

      # -----------------------------------------------------------------------
      # 第 3 步：安装依赖（要求仓库已提交 package-lock.json）
      # -----------------------------------------------------------------------
      - name: 安装依赖
        working-directory: ${{ env.WORK_DIR }}
        run: npm ci

      # -----------------------------------------------------------------------
      # 第 4 步：执行打包，生成 dist 静态资源
      # -----------------------------------------------------------------------
      - name: 执行打包
        working-directory: ${{ env.WORK_DIR }}
        run: npm run build

      # -----------------------------------------------------------------------
      # 第 5 步：打包为 tar.gz（确保 assets 子目录完整上传）
      # -----------------------------------------------------------------------
      - name: 压缩构建产物
        run: tar -czf dist.tar.gz -C ${{ env.WORK_DIR }}/${{ env.BUILD_DIR }} .

      # -----------------------------------------------------------------------
      # 第 6 步：SCP 上传到服务器临时目录
      # -----------------------------------------------------------------------
      - name: 上传压缩包到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: dist.tar.gz
          target: /tmp/

      # -----------------------------------------------------------------------
      # 第 7 步：SSH 清空 Nginx 目录并解压新文件（无需重启 Nginx）
      # -----------------------------------------------------------------------
      - name: 清空旧文件并部署新静态资源
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.FRONTEND_DEPLOY_PATH }}"
            mkdir -p "$DEPLOY_PATH"
            rm -rf "${DEPLOY_PATH:?}"/*
            tar -xzf /tmp/dist.tar.gz -C "$DEPLOY_PATH"
            rm -f /tmp/dist.tar.gz
            chmod -R a+rX "$DEPLOY_PATH"
            echo "前端已部署到: $DEPLOY_PATH"
            ls -la "$DEPLOY_PATH"

      # -----------------------------------------------------------------------
      # 第 8 步：可选 — 重载 Nginx（需部署用户具备 sudo 权限）
      # -----------------------------------------------------------------------
      - name: 重载 Nginx
        uses: appleboy/ssh-action@v1.2.0
        continue-on-error: true
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
            echo "Nginx 已重载"

      - name: 部署完成
        run: echo "前端部署流水线执行完毕"
