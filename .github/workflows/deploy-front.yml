# =============================================================================
# 前端自动部署流水线
# =============================================================================
# 触发：git push 到 main 分支（client 目录或本文件变更）
# 唯一需要配置的 Secret：SERVER_SSH_KEY（SSH 私钥）
# =============================================================================

name: 部署前端

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/deploy-front.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: 构建并部署前端
    runs-on: ubuntu-latest

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: 安装依赖
        working-directory: client
        run: npm ci

      - name: 执行打包
        working-directory: client
        run: npm run build

      - name: 压缩构建产物
        run: tar -czf dist.tar.gz -C client/dist .

      - name: 上传压缩包到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 114.55.150.237
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: dist.tar.gz
          target: /tmp/

      - name: 清空旧文件并部署新静态资源
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 114.55.150.237
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            DEPLOY_PATH="/var/www/todolist/html"
            mkdir -p "$DEPLOY_PATH"
            rm -rf "${DEPLOY_PATH:?}"/*
            tar -xzf /tmp/dist.tar.gz -C "$DEPLOY_PATH"
            rm -f /tmp/dist.tar.gz
            chmod -R a+rX "$DEPLOY_PATH"
            echo "前端已部署到: $DEPLOY_PATH"
            ls -la "$DEPLOY_PATH"

      - name: 重载 Nginx
        uses: appleboy/ssh-action@v1.2.0
        continue-on-error: true
        with:
          host: 114.55.150.237
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            sudo nginx -t && sudo systemctl reload nginx
            echo "Nginx 已重载"

      - name: 部署完成
        run: echo "前端部署流水线执行完毕"
