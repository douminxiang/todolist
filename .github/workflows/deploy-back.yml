# =============================================================================
# 后端自动部署流水线
# =============================================================================
# 触发：git push 到 main 分支（server 目录、pm2 配置或本文件变更）
# 唯一需要配置的 Secret：SERVER_SSH_KEY（SSH 私钥）
# =============================================================================

name: 部署后端

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'ecosystem.config.cjs'
      - '.github/workflows/deploy-back.yml'
  workflow_dispatch:

jobs:
  deploy-backend:
    name: 部署后端到服务器
    runs-on: ubuntu-latest

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 远程更新代码并重启服务
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 114.55.150.237
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e

            PROJECT_DIR="/var/www/todolist"
            SERVER_DIR="server"

            # 加载 nvm（若服务器用 nvm 安装 Node）
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # 修复 git 目录权限检查
            git config --global --add safe.directory "$PROJECT_DIR"

            echo ">>> 进入项目目录: $PROJECT_DIR"
            cd "$PROJECT_DIR" || { echo "项目目录不存在"; exit 1; }

            echo ">>> 拉取最新代码"
            git fetch origin main
            git checkout main
            git pull origin main

            echo ">>> 安装/更新后端依赖"
            cd "$PROJECT_DIR/$SERVER_DIR"
            npm ci

            echo ">>> pm2 重启后端进程"
            cd "$PROJECT_DIR"
            if pm2 describe todolist-api > /dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --update-env
            else
              pm2 start ecosystem.config.cjs
            fi
            pm2 save
            pm2 status

            echo ">>> 健康检查"
            sleep 2
            curl -sf http://127.0.0.1:3000/api/health || {
              pm2 logs todolist-api --lines 30 --nostream
              exit 1
            }

            echo "后端部署完成"

      - name: 部署完成
        run: echo "后端部署流水线执行完毕"
